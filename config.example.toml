[audio]
device = "BlackHole 2ch"
# device_index = 0
sample_rate = 16000
channels = 1
chunk_seconds = 8

[transcription]
whisper_model = "small"
language = "ja"
device = "cpu"
compute_type = "int8"

[summarization]
ollama_base_url = "http://localhost:11434"
ollama_model = "gemma4"
temperature = 0.2
num_ctx = 8192
timeout_seconds = 600

[output]
base_dir = "output"
save_transcript = true
save_audio = true

[chunking]
chunk_size = 6000
chunk_overlap = 500
