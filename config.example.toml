[audio]
device = "BlackHole 2ch"
# device_index = 0
sample_rate = 16000
channels = 1
chunk_seconds = 8

[transcription]
whisper_model = "small"
language = "ja"
device = "cpu"
compute_type = "int8"

[summarization]
ollama_base_url = "http://localhost:11434"
ollama_model = "gemma4"
temperature = 0.2
num_ctx = 8192
timeout_seconds = 600

[output]
base_dir = "output"
save_transcript = true
save_audio = true

[chunking]
chunk_size = 6000
chunk_overlap = 500

[vocabulary]
# 文字起こし精度向上のための語彙ヒント。会議ごとに用意したテキストファイル（1行1語、`#` でコメント）を指定する。
# ファイル未指定または存在しない場合は機能無効で従来通り動作する。
# glossary_file = "vocab/glossary.txt"
# participants_file = "vocab/participants.txt"
# Whisper の initial_prompt 上限（約224 token）に収めるための文字数上限。0 でヒント無効。
max_prompt_chars = 200
# 要約プロンプトへの語彙注入の文字数上限。上限を超える語彙は末尾から項目単位で切り落とす。0 で無効。
max_summary_chars = 1000
