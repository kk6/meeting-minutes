[audio]
device = "BlackHole 2ch"
# device_index = 0
sample_rate = 16000
channels = 1
chunk_seconds = 8
# true: 音声取り逃がし時に停止する。false: metadataに記録して続行する。
abort_on_overflow = true

[vad]
enabled = true
frame_ms = 30
speech_threshold = 0.01
silence_seconds = 0.8
min_speech_seconds = 0.3
max_speech_seconds = 15.0
padding_seconds = 0.2

[preprocessing]
enabled = false
normalize_peak = true
target_peak = 0.8
noise_gate_enabled = false
noise_gate_threshold = 0.003

[transcription]
whisper_model = "small"
language = "ja"
device = "cpu"
compute_type = "int8"

[transcript_filter]
enabled = true
canned_false_positives = ["Thank you.", "Thanks for watching.", "Bye."]
min_text_chars = 0
max_repeat_pattern_chars = 8
min_repeat_count = 4

[summarization]
ollama_base_url = "http://localhost:11434"
ollama_model = "gemma4"
temperature = 0.2
num_ctx = 8192
timeout_seconds = 600

[output]
base_dir = "output"
save_transcript = true
save_audio = true

[chunking]
chunk_size = 6000
chunk_overlap = 500

[vocabulary]
# 文字起こし精度向上のための語彙ヒント。会議ごとに用意したテキストファイル（1行1語、`#` でコメント）を指定する。
# ファイル未指定または存在しない場合は機能無効で従来通り動作する。
# glossary_file = "vocab/glossary.txt"
# participants_file = "vocab/participants.txt"
# Whisper の initial_prompt 上限（約224 token）に収めるための文字数上限。0 でヒント無効。
max_prompt_chars = 200
# 直近の採用済み文字起こしを initial_prompt に混ぜる。誤認識の持ち越しを避けるためデフォルトは無効。
dynamic_context_enabled = false
dynamic_context_chars = 120
# 要約プロンプトへの語彙注入の文字数上限。上限を超える語彙は末尾から項目単位で切り落とす。0 で無効。
max_summary_chars = 1000

[cleaning]
# clean コマンドの入力分割サイズ。要約（chunking）より小さめにして整形精度を高める。
chunk_size = 4000
# 整形は原文に近い形を保つため、overlap はデフォルト 0。overlap ありだと重複文が出力に混入する。
chunk_overlap = 0
# clean コマンドのデフォルト出力ファイル名。
output_filename = "transcript_clean.md"
